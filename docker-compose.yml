version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tube-postgres
    environment:
      POSTGRES_DB: tube
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tube"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hoetube-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - ./uploads:/app/uploads   # backend can write files

  frontend:
    build: ./frontend
    container_name: hoetube-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads   # nginx serves files

volumes:
  pgdata:
