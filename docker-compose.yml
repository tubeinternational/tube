version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tube-postgres
    environment:
      POSTGRES_DB: tube
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: hoetube-backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "5050:5000"

volumes:
  pgdata:
