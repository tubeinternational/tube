<div class="shorts-actions">
  <!-- Like -->
  <button
    class="action-btn"
    [class.liked]="liked"
    (click)="onLike(); $event.stopPropagation()"
  >
    <i class="fa-regular fa-thumbs-up text-pink"></i> <span>{{ likes }}</span>
  </button>

  <!-- Mute / Unmute -->
  <button class="action-btn" (click)="onToggleMute(); $event.stopPropagation()">
    {{ muted ? "🔇" : "🔊" }}
  </button>

  <!-- Share -->
  <button class="action-btn" (click)="onShare(); $event.stopPropagation()">
    🔗
  </button>

  <div class="copied-text" *ngIf="copied">Link copied</div>
</div>
