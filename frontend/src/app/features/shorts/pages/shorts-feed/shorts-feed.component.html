<div class="shorts-feed">
  <div class="shorts-stage">
    <div
      class="short"
      *ngFor="let video of shorts; let i = index"
      #shortEl
      (click)="setActive(i)"
    >
      <app-shorts-player
        *ngIf="video.stream_url"
        [src]="video.stream_url"
        [poster]="video.thumbnail_url"
        [active]="i === activeIndex"
        [muted]="muted"
      ></app-shorts-player>

      <div class="overlay"></div>

      <!-- FOOTER INFO -->
      <div
        class="short-footer"
        (click)="toggleDescription(i, $event)"
      >
        <p class="title">{{ video.title }}</p>

        <p class="description" *ngIf="expandedIndex === i">
          {{ video.description }}
        </p>
      </div>

      <app-shorts-actions
        [likes]="video.likes_count || 0"
        [liked]="video.is_liked || false"
        [muted]="muted"
        [slug]="video.slug"
        (toggleMute)="muted = !muted"
        (like)="onLike(video)"
      ></app-shorts-actions>
    </div>
  </div>
</div>
