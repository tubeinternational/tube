<div class="admin-page">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Manage Videos</h2>
    <button class="btn btn-primary" (click)="openAddModal()">
      + Upload Video
    </button>
  </div>

  <table class="table table-dark table-hover align-middle">
    <thead>
      <tr>
        <th>Video</th>
        <th>Title</th>
        <th>Views</th>
        <th>Category</th>
        <th>Video Type</th>
        <th>Uploaded</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let v of videos">
        <td>
          <a
            [routerLink]="getViewRoute(v)"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-sm btn-outline-primary fs-12"
          > View
          </a>
        </td>

        <td>{{ v.title }}</td>
        <td>{{ v.views }}</td>
        <td>{{ v.category }}</td>
        <td>{{ v.video_type }}</td>
        <td>{{ v.created_at | date : "short" }}</td>

        <td>
          <span
            class="badge"
            [class.bg-success]="v.is_active"
            [class.bg-secondary]="!v.is_active"
          >
            {{ v.is_active ? "Active" : "Hidden" }}
          </span>
        </td>

        <td class="d-flex gap-2">
          <button
            class="btn btn-sm btn-outline-light"
            (click)="openEditModal(v)"
          >
            ✏️
          </button>

          <button
            class="btn btn-sm btn-outline-danger"
            (click)="deleteVideo(v)"
          >
            🗑
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <nav *ngIf="totalPages > 1" class="d-flex justify-content-end mt-3">
    <ul class="pagination pagination-sm">
      <!-- Prev -->
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="fetchVideos(currentPage - 1)">
          Prev
        </button>
      </li>

      <!-- Page Numbers -->
      <li
        class="page-item"
        *ngFor="let page of pages"
        [class.active]="page === currentPage"
      >
        <button class="page-link" (click)="fetchVideos(page)">
          {{ page }}
        </button>
      </li>

      <!-- Next -->
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="fetchVideos(currentPage + 1)">
          Next
        </button>
      </li>
    </ul>
  </nav>
</div>
