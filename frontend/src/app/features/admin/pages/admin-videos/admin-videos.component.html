<div class="admin-page">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Manage Videos</h2>
    <button class="btn btn-primary" (click)="openAddModal()">
      + Upload Video
    </button>
  </div>

  <!-- 🔍 SEARCH & FILTER BAR -->
  <div class="row g-2 mb-3">
    <div class="col-md-5">
      <input
        type="text"
        class="form-control"
        placeholder="Search by title or video URL"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
      />
    </div>

    <!-- <div class="col-md-4">
      <select
        class="form-select"
        [(ngModel)]="selectedCategory"
        (change)="onSearch()"
      >
        <option [ngValue]="null">All Categories</option>

        <option *ngFor="let c of categories" [ngValue]="c.slug">
          {{ c.name }}
        </option>
      </select>
    </div> -->

    <div class="col-md-3 d-flex gap-2">
      <button class="btn btn-outline-primary w-100" (click)="onSearch()">
        Search
      </button>
      <button class="btn btn-outline-secondary w-100" (click)="clearFilters()">
        Clear
      </button>
    </div>
  </div>

  <!-- 📋 TABLE -->
  <div class="table-responsive">
    <table class="table table-dark table-hover align-middle">
      <thead>
        <tr>
          <th>Video</th>
          <th>Title</th>
          <th>Views</th>
          <th>Category</th>
          <th>Video Type</th>
          <th>Uploaded</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let v of videos">
          <td>
            <a
              [routerLink]="getViewRoute(v)"
              target="_blank"
              rel="noopener noreferrer"
              class="btn btn-sm btn-outline-primary"
            >
              View
            </a>
          </td>

          <td>{{ v.title }}</td>
          <td>{{ v.views }}</td>
          <td>{{ v.category }}</td>
          <td>{{ v.video_type }}</td>
          <td>{{ v.created_at | date: "short" }}</td>

          <td>
            <span
              class="badge"
              [class.bg-success]="v.is_active"
              [class.bg-secondary]="!v.is_active"
            >
              {{ v.is_active ? "Active" : "Hidden" }}
            </span>
          </td>

          <td class="d-flex gap-2">
            <button
              class="btn btn-sm btn-outline-light"
              (click)="openEditModal(v)"
            >
              ✏️
            </button>

            <button
              class="btn btn-sm btn-outline-danger"
              (click)="deleteVideo(v)"
            >
              🗑
            </button>
          </td>
        </tr>

        <tr *ngIf="!loading && !videos.length">
          <td colspan="8" class="text-center text-muted py-4">
            No videos found
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 📄 PAGINATION -->
  <nav *ngIf="totalPages > 1" class="d-flex justify-content-end mt-3">
    <ul class="pagination pagination-sm">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="fetchVideos(currentPage - 1)">
          Prev
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let page of pages"
        [class.active]="page === currentPage"
      >
        <button class="page-link" (click)="fetchVideos(page)">
          {{ page }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="fetchVideos(currentPage + 1)">
          Next
        </button>
      </li>
    </ul>
  </nav>
</div>
