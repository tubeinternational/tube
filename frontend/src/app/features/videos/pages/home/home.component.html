<!-- SEARCH RESULT TITLE -->
<div *ngIf="query" class="search-result-title">
  Search results for "{{ query }}"
</div>

<!-- LOADING -->
<div *ngIf="loading" class="loading">Loading videos...</div>

<!-- EMPTY STATE -->
<div *ngIf="!loading && videos.length === 0" class="empty">No videos found</div>

<app-ad-renderer *ngIf="homeTopAds.length" [ads]="homeTopAds"></app-ad-renderer>

<!-- VIDEO GRID -->
<div class="video-grid">
  <ng-container *ngFor="let video of videos; let i = index">
    <app-video-card [video]="video"></app-video-card>

    <!-- Inject ad after every 6 videos -->
    <ng-container *ngIf="i === 5">
      <app-ad-renderer [ads]="homeGridAds"></app-ad-renderer>
    </ng-container>
  </ng-container>
</div>

<!-- PAGINATION -->
<nav class="d-flex justify-content-center mt-4">
  <ul class="pagination">
    <!-- Prev -->
    <li
      class="page-item"
      [class.disabled]="totalPages === 1 || currentPage === 1"
    >
      <button
        type="button"
        class="page-link"
        (click)="onPageChange(currentPage - 1)"
        [disabled]="totalPages === 1 || currentPage === 1"
      >
        Prev
      </button>
    </li>

    <!-- Pages -->
    <li
      class="page-item"
      *ngFor="let page of pages"
      [class.active]="page === currentPage"
    >
      <button
        type="button"
        class="page-link"
        (click)="onPageChange(page)"
        [disabled]="totalPages === 1"
      >
        {{ page }}
      </button>
    </li>

    <!-- Next -->
    <li
      class="page-item"
      [class.disabled]="totalPages === 1 || currentPage === totalPages"
    >
      <button
        type="button"
        class="page-link"
        (click)="onPageChange(currentPage + 1)"
        [disabled]="totalPages === 1 || currentPage === totalPages"
      >
        Next
      </button>
    </li>
  </ul>
</nav>
