<div class="countries-page container-fluid py-4">
  <div class="row g-3">

    <div
      class="col-6 col-sm-4 col-md-3 col-lg-2"
      *ngFor="let c of countries"
    >
      <div
        class="country-card"
        (click)="onCountrySelect(c)"
      >
        <div class="flag">
          <span class="fi fi-{{ c.flagCode.toLowerCase() }}"></span>
        </div>

        <div class="name">
          {{ c.country }}
        </div>
      </div>
    </div>

  </div>
</div>
