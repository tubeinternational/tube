<div class="ads-page">
  <!-- TABS -->
  <ul ngbNav #nav="ngbNav" [(activeId)]="activeTab" class="nav-tabs">
    <li [ngbNavItem]="'HOME'">
      <a ngbNavLink (click)="selectTab('HOME')">Home</a>
    </li>
    <li [ngbNavItem]="'VIDEO'">
      <a ngbNavLink (click)="selectTab('VIDEO')">Video Details</a>
    </li>
    <li [ngbNavItem]="'FOOTER'">
      <a ngbNavLink (click)="selectTab('FOOTER')">Footer</a>
    </li>
  </ul>

  <div [ngbNavOutlet]="nav"></div>

  <!-- COLLAPSIBLE FORM -->
  <div class="mt-3">
    <button
      class="btn btn-primary mb-2"
      (click)="isFormCollapsed = !isFormCollapsed"
    >
      {{ isFormCollapsed ? "Create Ad" : "Close Form" }}
    </button>

    <div [ngbCollapse]="isFormCollapsed" class="card p-3">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          <div class="col-md-4">
            <label>Name</label>
            <input class="form-control" formControlName="name" />
          </div>

          <div class="col-md-3">
            <label>Placement</label>
            <select class="form-select" formControlName="placement">
              <option *ngFor="let p of getPlacements()" [value]="p">
                {{ p }}
              </option>
            </select>
          </div>

          <div class="col-md-2">
            <label>Priority</label>
            <input
              type="number"
              class="form-control"
              formControlName="priority"
            />
          </div>

          <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                formControlName="is_active"
              />
              <label class="form-check-label">Active</label>
            </div>
          </div>

          <div class="col-12">
            <label>Ad Script</label>
            <textarea
              class="form-control"
              rows="5"
              formControlName="code"
            ></textarea>
          </div>

          <div class="col-12 text-end">
            <button class="btn btn-success me-2" type="submit">
              {{ isEditMode ? "Update" : "Create" }}
            </button>

            <button
              class="btn btn-secondary"
              type="button"
              (click)="resetForm()"
            >
              Reset
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- TABLE -->
  <div class="mt-4 card p-3">
    <table class="table table-dark table-hover">
      <thead>
        <tr>
          <th>Name</th>
          <th>Placement</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let ad of ads">
          <td>{{ ad.name }}</td>
          <td>{{ ad.placement }}</td>
          <td>{{ ad.priority }}</td>
          <td>
            <span
              [class.text-success]="ad.is_active"
              [class.text-danger]="!ad.is_active"
            >
              {{ ad.is_active ? "Active" : "Inactive" }}
            </span>
          </td>

          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="edit(ad)">
              Edit
            </button>
            <button class="btn btn-sm btn-danger me-2" (click)="delete(ad.id)">
              Delete
            </button>
            <button class="btn btn-sm btn-info" (click)="toggle(ad)">
              Toggle
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
